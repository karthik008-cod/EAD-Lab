<!DOCTYPE html>
<html>
<head>
    <title>Async Await Example</title>
</head>
<body>
<div style="position:absolute;top:10px;right:20px;text-align:right;">
    <h4>Name:Yuvaan Kaarthikeyaa</h4>
    <h4>Roll No:160124737164</h4>
    <p><b>Open Console</b></p>
</div>
<script>
    function fetchData(){
        return new Promise(function(resolve){
            setTimeout(function(){
                resolve("Data loaded!");
            },2000);
        });
    }
    async function displayData(){
        console.log("Loading...");
        let result=await fetchData();
        console.log(result);
    }
    displayData();
</script>
</body>
</html>
